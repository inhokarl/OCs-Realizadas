<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Ocorrências</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #f0f4f8;
  padding: 8px;
  margin: 0;
}

h2 {
  color: #003A8F;
  font-size: 22px;
  margin-bottom: 8px;
}

label {
  font-size: 13px;
  color: #333;
  margin-top: 6px;
  display: block;
}

input, select {
  padding: 8px;
  margin: 4px 4px 8px 0;
  width: 100%;
  max-width: 340px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
}

button {
  padding: 8px 12px;
  margin: 5px 4px 5px 0;
  border: none;
  border-radius: 6px;
  background: #003A8F;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  font-size: 12px;
}

button:hover { opacity: 0.85; }

.card {
  background: #fff;
  padding: 12px;
  border-radius: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  margin-top: 10px;
  overflow: hidden;
}

#tela2 { display: none; }

.titulo {
  text-align: center;
  font-size: 17px;
  font-weight: bold;
  color: #003A8F;
  margin-top: 5px;
}

.dataTopo {
  text-align: center;
  font-size: 10px;
  color: #666;
  margin-bottom: 12px;
}

.tabela { width: 100%; margin-top: 12px; }

.linha {
  display: grid;
  grid-template-columns: 1.2fr 0.9fr 0.9fr 0.8fr 0.8fr 0.6fr 0.6fr 0.8fr 0.8fr 0.8fr 1fr 1fr;
  gap: 3px;
  padding: 6px 3px;
  border-bottom: 1px solid #eee;
  font-size: 8.5px;
  align-items: center;
  text-align: center;
}

.topoTabela {
  background: #003A8F;
  color: #fff;
  font-weight: bold;
  border-radius: 6px;
  font-size: 8px;
  padding: 8px 3px;
}

.horas {
  color: red;
  font-weight: bold;
}

.cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin-top: 14px;
}

.cardTotal {
  grid-column: 1 / -1;
  background: #003A8F;
  color: #fff;
  padding: 14px;
  border-radius: 12px;
  text-align: center;
  font-size: 15px;
  font-weight: bold;
  margin-bottom: 2px;
}

.cardResumo {
  background: #e6f0ff;
  padding: 10px;
  border-radius: 12px;
  text-align: center;
  font-size: 11px;
  font-weight: bold;
  min-height: 64px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
}

.cardNumero {
  font-size: 22px;
  color: #003A8F;
}

.rodape {
  text-align: center;
  margin-top: 14px;
  font-size: 11px;
  font-weight: bold;
  color: #555;
}

.listaItem {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid #eee;
  font-size: 12px;
}

.botoes { display: flex; gap: 5px; }
.editar { background: orange; }
.excluir { background: #e53935; }

#campoCi { display: none; margin-top: 2px; }

.semDados {
  color: #888;
  text-align: center;
  padding: 16px;
  font-size: 13px;
}

@media(min-width: 700px) {
  .cards { grid-template-columns: repeat(4, 1fr); }
  .linha { font-size: 11px; }
  .topoTabela { font-size: 9px; }
  input, select { width: 220px; }
}
</style>
</head>
<body>

<!-- TELA 1 CADASTRO -->
<div id="tela1">
  <h2>Cadastro de OC</h2>

  <label>Número da OC</label>
  <input id="oc" placeholder="Ex: 48004">

  <label>Mês de Referência</label>
  <input id="mesOc" type="month">

  <label>Data de Criação</label>
  <input id="dataCriacao" type="datetime-local">

  <label>Data de Solicitação</label>
  <input id="dataOc" type="datetime-local">

  <label>Data de Conclusão</label>
  <input id="dataConclusao" type="datetime-local">

  <label>Equipe</label>
  <input id="eq" list="listaEquipes" placeholder="Selecione ou digite">
  <datalist id="listaEquipes">
    <option value="ENG1022"><option value="ENG1023"><option value="ENG1024">
    <option value="ENG1025"><option value="ENG1026"><option value="ENG1027">
    <option value="ENG1028"><option value="ENG1029"><option value="ENG1030">
    <option value="ENG1031"><option value="ENG1032"><option value="ENG1033">
    <option value="ENG1034"><option value="ENG1035"><option value="ENG2012">
    <option value="ENG2013"><option value="ENG2014"><option value="ENG2015">
    <option value="ENG2016"><option value="ENG2017"><option value="ENG2018">
    <option value="ENG2019"><option value="ENG2020"><option value="ENG2022">
    <option value="ENG5003"><option value="SEM EQUIPE">
    <option value="LV"><option value="TP">
    <option value="LV+TP"><option value="TP+RÇ">
  </datalist>

  <label>UTD</label>
  <select id="utd">
    <option>GOIANA</option>
    <option>PAULISTA</option>
    <option>CAMARAGIBE</option>
    <option>TIMBAÚBA</option>
    <option>CARPINA</option>
  </select>

  <label>Possui CI?</label>
  <select id="possuiCi" onchange="toggleCi()">
    <option value="NAO">NÃO</option>
    <option value="SIM">SIM</option>
  </select>

  <label>Notificada?</label>
  <select id="notificada">
   <option value="NAO">NÃO</option>
   <option value="SIM">SIM</option>
  </select>

  <div id="campoCi">
    <label>Quantidade de CI</label>
    <input id="ci" type="number" placeholder="Ex: 5" min="0">
  </div>

  <br>
  <button id="btnAdd" onclick="add()">Adicionar</button>
  <button onclick="limpar()" style="background:#555;">Limpar Tudo</button>
  <button onclick="visualizar()" style="background:#1a7a1a;">Visualizar</button>

  <div id="lista" class="card"></div>
</div>

<!-- TELA 2 RELATORIO -->
<div id="tela2">
  <div style="margin-bottom:8px;">
    <button onclick="voltar()">Voltar</button>
    <button onclick="gerarPDF()" style="background:#b71c1c;">Gerar PDF</button>
  </div>
  <div id="relatorio" class="card"></div>
</div>

<script>
/* ══════════════════════════════════════
   DADOS E MAPEAMENTOS
══════════════════════════════════════ */
let dados = [];
let editIndex = null;

const processos = {
  ENG1022:"OBRA",       ENG1023:"MANUTENCAO", ENG1024:"OBRA",
  ENG1025:"OBRA",       ENG1026:"OBRA",       ENG1027:"MANUTENCAO",
  ENG1028:"OBRA",       ENG1029:"OBRA",       ENG1030:"OBRA",
  ENG1031:"OBRA",       ENG1032:"MANUTENCAO", ENG1033:"OBRA",
  ENG1034:"OBRA",       ENG1035:"OBRA",       ENG2012:"OBRA",
  ENG2013:"OBRA",       ENG2014:"OBRA",       ENG2015:"OBRA",
  ENG2016:"OBRA",       ENG2017:"OBRA",       ENG2018:"OBRA",
  ENG2019:"OBRA",       ENG2020:"OBRA",       ENG2022:"OBRA",
  ENG5003:"MANUTENCAO"
};

const processoDisplay = {
  "OBRA": "OBRA",
  "MANUTENCAO": "MANUTENÇÃO"
};

const bases = {
  ENG1022:"CARPINA",  ENG1023:"CARPINA",  ENG1024:"CARPINA",
  ENG1025:"CARPINA",  ENG1026:"CARPINA",  ENG1027:"CARPINA",
  ENG1028:"IGARASSU", ENG1029:"CARPINA",  ENG1030:"CARPINA",
  ENG1031:"CARPINA",  ENG1032:"CARPINA",  ENG1033:"IGARASSU",
  ENG1034:"IGARASSU", ENG1035:"IGARASSU", ENG2012:"CARPINA",
  ENG2013:"CARPINA",  ENG2014:"CARPINA",  ENG2015:"CARPINA",
  ENG2016:"CARPINA",  ENG2017:"CARPINA",  ENG2018:"CARPINA",
  ENG2019:"CARPINA",  ENG2020:"IGARASSU", ENG2022:"CARPINA",
  ENG5003:"CARPINA"
};

/* ══════════════════════════════════════
   UTILITÁRIOS
══════════════════════════════════════ */
function gerarId() {
  return Date.now() + "_" + Math.random().toString(36).substring(2, 8);
}

function salvarLocal() {
  localStorage.setItem("dadosOcorrencias", JSON.stringify(dados));
}

function carregarLocal() {
  const salvo = localStorage.getItem("dadosOcorrencias");
  if (salvo) {
    dados = JSON.parse(salvo);
    render();
  }
}

function gerarNumOC(numero, mes) {
  if (!mes) return numero;
  const [ano, m] = mes.split("-");
  return ano + "_" + m + "_" + numero;
}

function toggleCi() {
  const val = document.getElementById("possuiCi").value;
  document.getElementById("campoCi").style.display = val === "SIM" ? "block" : "none";
  if (val === "NAO") document.getElementById("ci").value = "";
}

function calcularTempo(dataInicio, dataFim) {
  if (!dataInicio || !dataFim) {
    return { horas: null, dias: null };
  }

  const ini = new Date(dataInicio);
  const fim = new Date(dataFim);

  const diffMs = fim - ini;

  if (diffMs <= 0) {
    return { horas: "0.0", dias: "0" };
  }

  const horas = diffMs / (1000 * 60 * 60);

  const inicioDia = new Date(
    ini.getFullYear(),
    ini.getMonth(),
    ini.getDate()
  );

  const fimDia = new Date(
    fim.getFullYear(),
    fim.getMonth(),
    fim.getDate()
  );

  const dias = Math.floor(
    (fimDia - inicioDia) / (1000 * 60 * 60 * 24)
  );

  return {
    horas: horas.toFixed(1),
    dias: dias
  };
}

function fmtData(dt) {
  if (!dt) return "-";
  const d = new Date(dt);
  const p = n => String(n).padStart(2, "0");
  return p(d.getDate()) + "/" + p(d.getMonth()+1) + " " + p(d.getHours()) + ":" + p(d.getMinutes());
}

function fmtDataCompleta(dt) {
  if (!dt) return "-";
  const d = new Date(dt);
  const p = n => String(n).padStart(2, "0");
  return p(d.getDate()) + "/" + p(d.getMonth()+1) + "/" + d.getFullYear() +
         " " + p(d.getHours()) + ":" + p(d.getMinutes());
}

function dtParaInput(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  const p = n => String(n).padStart(2, "0");
  return d.getFullYear() + "-" + p(d.getMonth()+1) + "-" + p(d.getDate()) +
         "T" + p(d.getHours()) + ":" + p(d.getMinutes());
}

/* ══════════════════════════════════════
   CRUD
══════════════════════════════════════ */
function add() {
  const ocVal   = document.getElementById("oc").value.trim();
  const eqVal   = document.getElementById("eq").value.trim();
  const utdVal  = document.getElementById("utd").value;
  const mesVal  = document.getElementById("mesOc").value;
  const criacao = document.getElementById("dataCriacao").value;
  const solic   = document.getElementById("dataOc").value;
  const concl   = document.getElementById("dataConclusao").value;
  const posCI   = document.getElementById("possuiCi").value;
  const qtdCI   = posCI === "SIM" ? (Number(document.getElementById("ci").value) || 0) : 0;
  const notificada = document.getElementById("notificada").value;
  if (!ocVal || !eqVal || !solic) {
    alert("Preencha: Número da OC, Equipe e Data de Solicitação.");
    return;
  }

  const idAtual = editIndex === null
    ? gerarId()
    : (dados[editIndex].id || gerarId());

  const item = {
    id: idAtual,
    oc: ocVal,
    eq: eqVal,
    utd: utdVal,
    mes: mesVal,
    dataCriacao: criacao,
    data: solic,
    dataConclusao: concl,
    possuiCi: posCI,
    ci: qtdCI,
    notificada: notificada
  };

  if (editIndex === null) {
    dados.push(item);
  } else {
    dados[editIndex] = item;
    editIndex = null;
    document.getElementById("btnAdd").innerText = "Adicionar";
  }

  salvarLocal();
  render();
  limparCampos();
}

function editar(i) {
  const d = dados[i];
  document.getElementById("oc").value            = d.oc || "";
  document.getElementById("eq").value            = d.eq || "";
  document.getElementById("utd").value           = d.utd || "GOIANA";
  document.getElementById("mesOc").value         = d.mes || "";
  document.getElementById("dataCriacao").value   = dtParaInput(d.dataCriacao);
  document.getElementById("dataOc").value        = dtParaInput(d.data);
  document.getElementById("dataConclusao").value = dtParaInput(d.dataConclusao);
  document.getElementById("possuiCi").value      = d.possuiCi || "NAO";
  toggleCi();
  document.getElementById("ci").value            = d.ci || "";
  editIndex = i;
  document.getElementById("btnAdd").innerText = "Atualizar";
  window.scrollTo(0, 0);
  document.getElementById("notificada").value = d.notificada || "NAO";
}

function excluir(i) {
  if (!confirm("Excluir esta OC?")) return;
  dados.splice(i, 1);
  salvarLocal();
  render();
}

function limpar() {
  if (!confirm("Apagar todos os registros?")) return;
  dados = [];
  salvarLocal();
  render();
}

function limparCampos() {
  ["oc","eq","mesOc","dataCriacao","dataOc","dataConclusao","ci"].forEach(function(id) {
    document.getElementById(id).value = "";
  });
  document.getElementById("possuiCi").value = "NAO";
  document.getElementById("campoCi").style.display = "none";
  document.getElementById("notificada").value = "NAO";
}

/* ══════════════════════════════════════
   RENDER LISTA TELA 1
══════════════════════════════════════ */
function render() {
  const lista = document.getElementById("lista");
  if (dados.length === 0) {
    lista.innerHTML = '<p class="semDados">Nenhuma OC cadastrada.</p>';
    return;
  }
  lista.innerHTML = dados.map(function(d, i) {
    return '<div class="listaItem">' +
      '<div>' +
        '<b>' + gerarNumOC(d.oc, d.mes) + '</b><br>' +
        '<span style="color:#555;">' + d.eq + ' | ' + d.utd + '</span><br>' +
        '<span style="font-size:11px;color:#888;">Solic.: ' + fmtData(d.data) + '</span>' +
      '</div>' +
      '<div class="botoes">' +
        '<button class="editar" onclick="editar(' + i + ')">Editar</button>' +
        '<button class="excluir" onclick="excluir(' + i + ')">X</button>' +
      '</div>' +
    '</div>';
  }).join("");
}

/* ══════════════════════════════════════
   VISUALIZAR RELATORIO TELA 2
══════════════════════════════════════ */
function visualizar() {
  const listaOrdenada = dados.slice().sort(function(a, b) {
    return Number(a.oc) - Number(b.oc);
  });

  let totalOc    = listaOrdenada.length;
  let totalComCI = 0;
  let totalSemCI = 0;
  let procCount  = { OBRA: 0, MANUTENCAO: 0 };

  listaOrdenada.forEach(function(d) {
    if (d.possuiCi === "SIM") totalComCI++; else totalSemCI++;
    const proc = processos[d.eq];
    if (proc) procCount[proc] = (procCount[proc] || 0) + 1;
  });

  const dataAtual = new Date().toLocaleString("pt-BR");

  const linhasHTML = listaOrdenada.map(function(d) {
    const tempo     = calcularTempo(d.data, d.dataConclusao);
    const processo  = processoDisplay[processos[d.eq]] || "-";
    const base      = bases[d.eq] || "-";
    const horasExib = tempo.horas !== null
      ? '<span class="horas">' + tempo.horas + 'h</span>'
      : '-';
    const diasExib  = tempo.dias !== null ? tempo.dias + 'd' : '-';

    return '<div class="linha">' +
      '<div>' + gerarNumOC(d.oc, d.mes) + '</div>' +
      '<div>' + d.eq + '</div>' +
      '<div>' + processo + '</div>' +
      '<div>' + base + '</div>' +
      '<div>' + d.utd + '</div>' +
      '<div>' + (d.possuiCi === "SIM" ? "SIM" : "NÃO") + '</div>' +
      '<div>' + (d.possuiCi === "SIM" ? d.ci : "-") + '</div>' +
      '<div>' + (d.notificada || "NAO") + '</div>' +
      '<div>' + horasExib + '</div>' +
      '<div>' + diasExib + '</div>' +
      '<div>' + fmtData(d.data) + '</div>' +
      '<div>' + fmtData(d.dataConclusao) + '</div>' +
    '</div>';
  }).join("");

  document.getElementById("relatorio").innerHTML =
    '<div class="titulo">ACOMPANHAMENTO-TP-LV-EPs</div>' +
    '<div class="dataTopo">Gerado em: ' + dataAtual + '</div>' +

    '<div class="cards">' +
      '<div class="cardTotal">TOTAL DE OCs: ' + totalOc + '</div>' +
      '<div class="cardResumo">OCs com CI<div class="cardNumero">' + totalComCI + '</div></div>' +
      '<div class="cardResumo">OCs sem CI<div class="cardNumero">' + totalSemCI + '</div></div>' +
      '<div class="cardResumo">TP-Obra<div class="cardNumero">' + (procCount.OBRA || 0) + '</div></div>' +
      '<div class="cardResumo">TP-Manutenção<div class="cardNumero">' + (procCount.MANUTENCAO || 0) + '</div></div>' +
    '</div>' +

    '<div class="tabela">' +
      '<div class="linha topoTabela">' +
        '<div>OC</div><div>Equipe</div><div>Processo</div><div>Base</div>' +
        '<div>UTD</div><div>CI?</div><div>Qtd CI</div><div>Notificada</div><div>Horas</div>' +
        '<div>Dias</div><div>Dt Solic.</div><div>Dt Conclusão</div>' +
      '</div>' +
      linhasHTML +
    '</div>' +

    '<div class="rodape">Manutenção, UTEP Setor Norte</div>';

  document.getElementById("tela1").style.display = "none";
  document.getElementById("tela2").style.display = "block";
  window.scrollTo(0, 0);
}

function voltar() {
  document.getElementById("tela1").style.display = "block";
  document.getElementById("tela2").style.display = "none";
}

/* ══════════════════════════════════════
   GERAR PDF COM jsPDF + AutoTable
══════════════════════════════════════ */
function gerarPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });

  const listaOrdenada = dados.slice().sort(function(a, b) {
    return Number(a.oc) - Number(b.oc);
  });

  let totalOc    = listaOrdenada.length;
  let totalComCI = 0;
  let totalSemCI = 0;
  let procCount  = { OBRA: 0, MANUTENCAO: 0 };

  listaOrdenada.forEach(function(d) {
    if (d.possuiCi === "SIM") totalComCI++; else totalSemCI++;
    const proc = processos[d.eq];
    if (proc) procCount[proc] = (procCount[proc] || 0) + 1;
  });

  const pageW = doc.internal.pageSize.getWidth();
  const dataAtual = new Date().toLocaleString("pt-BR");

  /* ── Cabeçalho ── */
  doc.setFillColor(0, 58, 143);
  doc.rect(0, 0, pageW, 20, "F");

  doc.setTextColor(255, 255, 255);
  doc.setFontSize(14);
  doc.setFont("helvetica", "bold");
  doc.text("ACOMPANHAMENTO - TP - LV - EPs", pageW / 2, 10, { align: "center" });

  doc.setFontSize(8);
  doc.setFont("helvetica", "normal");
  doc.text("Manutencao, UTEP Setor Norte", pageW / 2, 16, { align: "center" });

  doc.setTextColor(100, 100, 100);
  doc.setFontSize(7);
  doc.text("Gerado em: " + dataAtual, pageW - 8, 4, { align: "right" });

  /* ── Cards de resumo ── */
  doc.setTextColor(0, 0, 0);

  const cards = [
    { label: "Total de OCs",   valor: String(totalOc) },
    { label: "OCs com CI",     valor: String(totalComCI) },
    { label: "OCs sem CI",     valor: String(totalSemCI) },
    { label: "TP-Obra",        valor: String(procCount.OBRA || 0) },
    { label: "TP-Manutencao",  valor: String(procCount.MANUTENCAO || 0) }
  ];

  const cardW  = 50;
  const cardH  = 18;
  const startX = 8;
  const startY = 24;
  const gapX   = 4;

  cards.forEach(function(c, idx) {
    const cx = startX + idx * (cardW + gapX);
    const cy = startY;

    doc.setFillColor(230, 240, 255);
    doc.roundedRect(cx, cy, cardW, cardH, 3, 3, "F");

    doc.setFontSize(7);
    doc.setFont("helvetica", "normal");
    doc.setTextColor(80, 80, 80);
    doc.text(c.label, cx + cardW / 2, cy + 6, { align: "center" });

    doc.setFontSize(13);
    doc.setFont("helvetica", "bold");
    doc.setTextColor(0, 58, 143);
    doc.text(c.valor, cx + cardW / 2, cy + 14, { align: "center" });
  });

  /* ── Tabela de dados ── */
  const colunas = [
  "OC", "Equipe", "Processo", "Base",
  "UTD", "CI?", "Qtd CI", "Notificada",
  "Horas", "Dias",
  "Dt Solicitacao", "Dt Conclusao"
];

  const linhas = listaOrdenada.map(function(d) {
    const tempo    = calcularTempo(d.data, d.dataConclusao);
    const processo = processoDisplay[processos[d.eq]] || "-";
    const base     = bases[d.eq] || "-";
    return [
  gerarNumOC(d.oc, d.mes),
  d.eq,
  processo,
  base,
  d.utd,
  d.possuiCi === "SIM" ? "SIM" : "NAO",
  d.possuiCi === "SIM" ? String(d.ci) : "-",
  d.notificada || "NAO",
  tempo.horas !== null ? tempo.horas + "h" : "-",
  tempo.dias  !== null ? tempo.dias  + "d" : "-",
  fmtDataCompleta(d.data),
  fmtDataCompleta(d.dataConclusao)
];
  });

  doc.autoTable({
    head: [colunas],
    body: linhas,
    startY: startY + cardH + 4,
    margin: { left: 8, right: 8 },
    styles: {
      fontSize: 7,
      cellPadding: 2,
      overflow: "linebreak",
      valign: "middle",
      halign: "center"
    },
    headStyles: {
      fillColor: [0, 58, 143],
      textColor: [255, 255, 255],
      fontStyle: "bold",
      fontSize: 7
    },
    alternateRowStyles: {
      fillColor: [240, 246, 255]
    },
    columnStyles: {
      7: { textColor: [200, 0, 0], fontStyle: "bold" }
    },
    didDrawPage: function(data) {
      const pageCount = doc.internal.getNumberOfPages();
      const pageH     = doc.internal.pageSize.getHeight();
      doc.setFontSize(7);
      doc.setTextColor(150);
      doc.setFont("helvetica", "normal");
      doc.text(
        "Pagina " + data.pageNumber + " de " + pageCount,
        pageW / 2,
        pageH - 4,
        { align: "center" }
      );
    }
  });

  doc.save("Relatorio_OCs.pdf");
}

/* ══════════════════════════════════════

══════════════════════════════════════ */
carregarLocal();
</script>
